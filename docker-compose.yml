x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 6
  start_period: 30s

services:
  web-search-mcp:
    build: .
    container_name: web-search-mcp
    restart: unless-stopped
    ports:
      - "${MCP_HOST_PORT:-8002}:8000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_URL=http://crawl4ai:11235
      - VALKEY_URL=redis://valkey:6379/0
      - RERANK_MODEL=${RERANK_MODEL:-ms-marco-MiniLM-L-12-v2}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}
      - MAX_RESULTS=${MAX_RESULTS:-10}
      - MAX_SCRAPE=${MAX_SCRAPE:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()"]
    depends_on:
      searxng:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
      valkey:
        condition: service_healthy

  searxng:
    image: ${SEARXNG_IMAGE:-docker.io/searxng/searxng:2026.4.16-ae0b0e56a}
    container_name: searxng
    restart: unless-stopped
    volumes:
      # Mount only settings.yml as read-only so the SearXNG entrypoint can't
      # chown the whole host config dir to its internal UID (977), which
      # wedges host-side git operations on searxng/config/*. The template
      # is host-only (rendered into settings.yml by `just setup`); /etc/searxng
      # inside the container stays writable in the container layer for uwsgi.ini
      # and other image-generated files.
      - ./searxng/config/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/var/cache/searxng
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).read()"]

  crawl4ai:
    image: ${CRAWL4AI_IMAGE:-unclecode/crawl4ai:0.8.6}
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: 1g
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11235/health', timeout=3).read()"]

  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:8-alpine}
    container_name: valkey
    restart: unless-stopped
    # RDB snapshots are enough: the cache is regenerable — we don't need AOF durability.
    # Save after: 5m & ≥1 key, 1m & ≥100 keys, 30s & ≥10k keys.
    command: ["valkey-server", "--save", "300 1", "--save", "60 100", "--save", "30 10000", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - valkey-data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "valkey-cli", "ping"]

volumes:
  searxng-data:
  valkey-data:
